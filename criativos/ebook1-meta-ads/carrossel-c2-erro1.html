    align-items: center;

    text-align: center;

  .book-3d .book-badge {
    font-size: 9px;
    letter-spacing: 2px;
    color: #03E4D0;
    text-transform: uppercase;

  }
  .book-3d .book-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #FFFFFF;
    margin-bottom: 20px;
  }
  .book-3d .book-author {
    font-size: 11px;
    color: #C9A84C;
  }
  .book-3d .book-company {
    font-size: 10px;
    color: #A0A0C0;
    margin-top: 4px;
  }
  .book-3d .book-spine {
    position: absolute;
    left: -4px;
    top: 4px;
    bottom: 4px;
    width: 8px;
    background: #03E4D0;
    border-radius: 4px 0 0 4px;
  }
</style>
