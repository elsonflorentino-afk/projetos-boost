name: Atualizar Dashboard Performance

on:
  schedule:
    - cron: '0 */2 * * *'   # a cada 2 horas
  workflow_dispatch:          # permite rodar manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar dashboard Performance
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          RD_CLIENT_ID: ${{ secrets.RD_CLIENT_ID }}
          RD_CLIENT_SECRET: ${{ secrets.RD_CLIENT_SECRET }}
          RD_REFRESH_TOKEN: ${{ secrets.RD_REFRESH_TOKEN }}
        run: python scripts/dashboard_performance.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add painel/performance-pos-reestruturacao/index.html
          git diff --staged --quiet || git commit -m "chore: atualizar dashboard performance $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
