name: Sync RD CRM → LinkedIn CAPI

on:
  # Cron diário às 10:00 UTC (07:00 BRT) — após sync RD CRM (08:00 UTC)
  schedule:
    - cron: '0 10 * * *'
  # Permite rodar manualmente pela UI do GitHub
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de sync'
        required: true
        default: 'incremental'
        type: choice
        options:
          - incremental
          - backfill
      since_hours:
        description: 'Horas atrás (só modo incremental)'
        required: false
        default: '72'
      backfill_days:
        description: 'Dias atrás (só modo backfill)'
        required: false
        default: '30'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: painel/metas-kpis/linkedin_capi_cache.json
          key: linkedin-capi-cache-${{ github.run_number }}
          restore-keys: linkedin-capi-cache-

      - name: Run sync (incremental cron)
        if: github.event_name == 'schedule'
        env:
          RD_CRM_TOKEN: ${{ secrets.RD_CRM_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AD_ACCOUNT_ID: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          LINKEDIN_CONVERSION_RULE_ID: ${{ secrets.LINKEDIN_CONVERSION_RULE_ID }}
        run: python3 scripts/sync_linkedin_capi.py --since-hours 72

      - name: Run sync (manual incremental)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'incremental'
        env:
          RD_CRM_TOKEN: ${{ secrets.RD_CRM_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AD_ACCOUNT_ID: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          LINKEDIN_CONVERSION_RULE_ID: ${{ secrets.LINKEDIN_CONVERSION_RULE_ID }}
        run: python3 scripts/sync_linkedin_capi.py --since-hours ${{ inputs.since_hours }}

      - name: Run sync (manual backfill)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'backfill'
        env:
          RD_CRM_TOKEN: ${{ secrets.RD_CRM_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AD_ACCOUNT_ID: ${{ secrets.LINKEDIN_AD_ACCOUNT_ID }}
          LINKEDIN_CONVERSION_RULE_ID: ${{ secrets.LINKEDIN_CONVERSION_RULE_ID }}
        run: python3 scripts/sync_linkedin_capi.py --backfill-days ${{ inputs.backfill_days }}

      - name: Save cache artifact
        if: always()
        uses: actions/cache/save@v4
        with:
          path: painel/metas-kpis/linkedin_capi_cache.json
          key: linkedin-capi-cache-${{ github.run_number }}
